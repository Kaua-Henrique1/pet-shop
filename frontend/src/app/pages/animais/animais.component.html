<div class="container">
  <h2>Gerenciamento de Pets</h2>
  
  <!-- ========================================== -->
  <!-- TELA 1: LISTAGEM -->
  <!-- ========================================== -->
  <div *ngIf="!exibirFormulario">
    
    <div style="display: flex; margin-bottom: 20px; align-items: center;">
      
      <div style="display: flex; gap: 16px;">
        <button mat-raised-button color="primary" (click)="novoAnimal()">
          <mat-icon>add</mat-icon> Novo Animal
        </button>
        <button mat-raised-button color="accent" routerLink="/tutores">
          <mat-icon>people</mat-icon> Gerenciar Tutores
        </button>
      </div>

      <!-- Empurra o botão de sair para o canto direito -->
      <div style="margin-left: auto;">
        <button mat-raised-button color="warn" (click)="logout()">
          <mat-icon>logout</mat-icon> Sair
        </button>
      </div>

    </div>

    <table mat-table [dataSource]="animais" class="mat-elevation-z8">
      <!-- Coluna Nome -->
      <ng-container matColumnDef="nome">
        <th mat-header-cell *matHeaderCellDef> Nome </th>
        <td mat-cell *matCellDef="let animal"> {{animal.nome}} </td>
      </ng-container>
      
      <!-- Coluna Espécie -->
      <ng-container matColumnDef="especie">
        <th mat-header-cell *matHeaderCellDef> Espécie </th>
        <td mat-cell *matCellDef="let animal"> 
          {{ animal.especie === 1 ? 'Gato' : (animal.especie === 0 ? 'Cachorro' : animal.especie) }} 
        </td>
      </ng-container>
      
      <!-- Coluna Idade -->
      <ng-container matColumnDef="idade">
        <th mat-header-cell *matHeaderCellDef> Idade </th>
        <td mat-cell *matCellDef="let animal"> {{animal.idade}} anos </td>
      </ng-container>
      
      <!-- Coluna Peso -->
      <ng-container matColumnDef="peso">
        <th mat-header-cell *matHeaderCellDef> Peso </th>
        <td mat-cell *matCellDef="let animal"> {{animal.peso}} kg </td>
      </ng-container>
      
      <!-- Coluna Nome Tutor -->
      <ng-container matColumnDef="nomeTutor">
        <th mat-header-cell *matHeaderCellDef> Tutor </th>
        <td mat-cell *matCellDef="let animal"> {{ animal.tutor?.nome }} </td>
      </ng-container>
      
      <!-- Coluna Ações -->
      <ng-container matColumnDef="acoes">
        <th mat-header-cell *matHeaderCellDef> Ações </th>
        <td mat-cell *matCellDef="let animal">
          <button mat-icon-button color="accent" (click)="prepararEdicao(animal)">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="excluirAnimal(animal.id)">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>
      
      <tr mat-header-row *matHeaderRowDef="colunasExibidas"></tr>
      <tr mat-row *matRowDef="let row; columns: colunasExibidas;"></tr>
    </table>
  </div>

  <!-- ========================================== -->
  <!-- TELA 2: FORMULÁRIO -->
  <!-- ========================================== -->
  <div *ngIf="exibirFormulario">
    <form [formGroup]="animalForm" (ngSubmit)="salvar()" class="form-container">
      <h3>{{ editando ? 'Editar Animal' : 'Novo Animal' }}</h3>
      
      <div class="form-grid">
        <div>
          <label>Nome:</label>
          <input type="text" formControlName="nome" placeholder="Nome do pet">
        </div>
        <div>
          <label>Espécie:</label>
          <select formControlName="especie" style="width: 100%; padding: 10px; border-radius: 4px; border: 1px solid #ccc; box-sizing: border-box;">
            <option [ngValue]="0">Cachorro</option>
            <option [ngValue]="1">Gato</option>
          </select>
        </div>
        <div>
          <label>Peso (kg):</label>
          <input type="number" step="0.1" formControlName="peso">
        </div>
        <div>
          <label>Data Nasc.:</label>
          <input type="date" formControlName="dataNascimento" (change)="calcularIdade()">
        </div>
        <div>
          <label>Idade:</label>
          <input type="number" formControlName="idade">
        </div>
        <div>
          <label>Tutor:</label>
          <div style="display:flex;gap:8px;align-items:center;">
            <select formControlName="tutorId">
              <option [value]="0">Selecione um tutor...</option>
              <option *ngFor="let t of tutores" [value]="t.id">{{t.nome}}</option>
            </select>
          </div>
        </div>
      </div>
      
      <div class="acoes-form">
        <button mat-raised-button color="primary" type="submit" [disabled]="animalForm.invalid">
          <mat-icon>save</mat-icon> {{ editando ? 'Atualizar Animal' : 'Cadastrar Animal' }}
        </button>
        
        <button mat-raised-button color="warn" type="button" (click)="cancelarEdicao()">
          <mat-icon>cancel</mat-icon> Cancelar
        </button>
      </div>
    </form>
  </div>
</div>
