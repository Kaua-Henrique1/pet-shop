<div class="container">
  <h2>Gerenciamento de Pets</h2>
  
  <button mat-raised-button color="primary" class="btn-novo">
    <mat-icon>add</mat-icon> Novo Animal
  </button>

  <table mat-table [dataSource]="animais" class="mat-elevation-z8">
    
    <!-- Coluna ID -->
    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef> ID </th>
      <td mat-cell *matCellDef="let animal"> {{animal.id}} </td>
    </ng-container>

    <!-- Coluna Nome -->
    <ng-container matColumnDef="nome">
      <th mat-header-cell *matHeaderCellDef> Nome </th>
      <td mat-cell *matCellDef="let animal"> {{animal.nome}} </td>
    </ng-container>

    <!-- Coluna Espécie -->
    <ng-container matColumnDef="especie">
      <th mat-header-cell *matHeaderCellDef> Espécie </th>
      <td mat-cell *matCellDef="let animal"> {{animal.especie}} </td>
    </ng-container>

    <!-- Coluna Raça -->
    <ng-container matColumnDef="raca">
      <th mat-header-cell *matHeaderCellDef> Raça </th>
      <td mat-cell *matCellDef="let animal"> {{animal.raca}} </td>
    </ng-container>

    <!-- Coluna Ações (Botões de Editar e Excluir) -->
    <ng-container matColumnDef="acoes">
      <th mat-header-cell *matHeaderCellDef> Ações </th>
      <td mat-cell *matCellDef="let animal">
        <button mat-icon-button color="accent">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button color="warn">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="colunasExibidas"></tr>
    <tr mat-row *matRowDef="let row; columns: colunasExibidas;"></tr>
  </table>
</div>
